name: generate-snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: KuaaMU
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=green&color_dots=#161b22,#58a6ff,#1f6feb,#388bfd,#1158c7
            dist/github-contribution-grid-snake-dark.gif

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
